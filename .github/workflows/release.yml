name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package
        run: |
          mkdir -p dist
          cp server.bat dist/
          cp -r tools/ dist/tools/
          cd dist
          zip -r "../omp-starter-${{ steps.version.outputs.VERSION }}.zip" .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: omp-starter-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
